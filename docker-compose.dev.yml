version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: med-postgres-dev
    environment:
      POSTGRES_USER: med
      POSTGRES_PASSWORD: med
      POSTGRES_DB: med
    ports:
      - '5432:5432'
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U med']
      interval: 5s
      retries: 10

volumes:
  pgdata_dev:
