version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: med
      POSTGRES_PASSWORD: med
      POSTGRES_DB: med
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U med']
      interval: 5s
      retries: 10

  backend-auth:
    build:
      context: .
      dockerfile: apps/backend-auth/Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: med
      DB_PASS: med
      DB_NAME: med
      JWT_SECRET: super-secret-change-me
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy

  backend-api:
    build:
      context: .
      dockerfile: apps/backend-api/Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: med
      DB_PASS: med
      DB_NAME: med
      JWT_SECRET: super-secret-change-me
    ports:
      - '4001:4001'
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend-host/Dockerfile
    ports:
      - '80:80'
    depends_on:
      - backend-auth
      - backend-api

volumes:
  pgdata:
